<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>여행 코스 지도 만들기</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>여행 코스 지도</h1>
        <p class="subtitle">장소를 검색해서 나만의 여행 루트를 만들어보세요</p>
      </div>

      <div id="search-section">
        <div id="search-wrap">
          <input
            type="text"
            id="search-input"
            placeholder="장소명 검색 (예: 도쿄, 파리)"
            autocomplete="off"
          />
          <div id="search-spinner" class="hidden">⏳</div>
        </div>
        <div id="search-results"></div>
      </div>

      <div id="course-section">
        <div id="course-header">
          <h2>코스 목록</h2>
          <button id="edit-toggle" title="여행지명 편집">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
            </svg>
          </button>
        </div>
        <div id="course-list"></div>
      </div>

      <div id="actions">
        <button id="export-btn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor">
            <path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/>
          </svg>
          이미지로 저장
        </button>
        <button id="clear-btn">전체 초기화</button>
      </div>
    </aside>

    <main id="map-container">
      <div id="map"></div>
      <!-- 상단 우측: 핀 추가 버튼만 -->
      <div id="map-controls-top">
        <button id="pin-toggle" title="지도에 핀 찍어 장소 추가">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
          <span>핀 추가</span>
        </button>
      </div>
      <!-- 이동수단 필터 팝오버 (JS로 chips 채워짐) -->
      <div id="badge-filter-popover"></div>
      <!-- 하단 중앙: 표시 옵션 + 배율 -->
      <div id="map-controls-bottom">
        <button id="course-toggle" class="active" title="코스(경로선) 표시/숨기기">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 15.18V7c0-2.21-1.79-4-4-4s-4 1.79-4 4v10c0 1.1-.9 2-2 2s-2-.9-2-2V8.82C8.16 8.4 9 7.3 9 6c0-1.66-1.34-3-3-3S3 4.34 3 6c0 1.3.84 2.4 2 2.82V17c0 2.21 1.79 4 4 4s4-1.79 4-4V7c0-1.1.9-2 2-2s2 .9 2 2v8.18c-1.16.41-2 1.51-2 2.82 0 1.66 1.34 3 3 3s3-1.34 3-3c0-1.31-.84-2.41-2-2.82z"/>
          </svg>
          <span>코스</span>
        </button>
        <button id="badge-toggle" class="active" title="이동수단 표시/숨기기">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M6 18V18.5C6 18.9167 5.85417 19.2708 5.5625 19.5625C5.27083 19.8542 4.91667 20 4.5 20C4.08333 20 3.72917 19.8542 3.4375 19.5625C3.14583 19.2708 3 18.9167 3 18.5V16.95C2.7 16.6167 2.45833 16.2458 2.275 15.8375C2.09167 15.4292 2 14.9833 2 14.5V5C2 3.61667 2.64167 2.60417 3.925 1.9625C5.20833 1.32083 7.23333 1 10 1C12.8667 1 14.9167 1.30833 16.15 1.925C17.3833 2.54167 18 3.56667 18 5V14.5C18 14.9833 17.9083 15.4292 17.725 15.8375C17.5417 16.2458 17.3 16.6167 17 16.95V18.5C17 18.9167 16.8542 19.2708 16.5625 19.5625C16.2708 19.8542 15.9167 20 15.5 20C15.0833 20 14.7292 19.8542 14.4375 19.5625C14.1458 19.2708 14 18.9167 14 18.5V18H6ZM4 9H16V6H4V9ZM6.5 15C6.91667 15 7.27083 14.8542 7.5625 14.5625C7.85417 14.2708 8 13.9167 8 13.5C8 13.0833 7.85417 12.7292 7.5625 12.4375C7.27083 12.1458 6.91667 12 6.5 12C6.08333 12 5.72917 12.1458 5.4375 12.4375C5.14583 12.7292 5 13.0833 5 13.5C5 13.9167 5.14583 14.2708 5.4375 14.5625C5.72917 14.8542 6.08333 15 6.5 15ZM13.5 15C13.9167 15 14.2708 14.8542 14.5625 14.5625C14.8542 14.2708 15 13.9167 15 13.5C15 13.0833 14.8542 12.7292 14.5625 12.4375C14.2708 12.1458 13.9167 12 13.5 12C13.0833 12 12.7292 12.1458 12.4375 12.4375C12.1458 12.7292 12 13.0833 12 13.5C12 13.9167 12.1458 14.2708 12.4375 14.5625C12.7292 14.8542 13.0833 15 13.5 15Z"/>
            </svg>
            <span>이동수단</span>
            <span id="badge-filter-dot"></span>
          </button>
        <button id="photo-toggle" title="여행지 이미지 표시/숨기기">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
          </svg>
          <span>이미지</span>
        </button>
        <div class="bottom-divider"></div>
        <div id="scale-control">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" opacity="0.5">
            <path d="M15 3l2.3 2.3-2.89 2.87 1.42 1.42L18.7 6.7 21 9V3h-6zM3 9l2.3-2.3 2.87 2.89 1.42-1.42L6.7 5.3 9 3H3v6zm6 12l-2.3-2.3 2.89-2.87-1.42-1.42L5.3 17.3 3 15v6h6zm12-6l-2.3 2.3-2.87-2.89-1.42 1.42 2.89 2.87L15 21h6v-6z"/>
          </svg>
          <button class="scale-btn" data-scale="0.8">0.8×</button>
          <button class="scale-btn active" data-scale="1">1×</button>
          <button class="scale-btn" data-scale="1.5">1.5×</button>
          <button class="scale-btn" data-scale="2">2×</button>
        </div>
      </div>
      <div id="pin-mode-hint">📍 지도를 클릭해서 장소를 추가하세요 &nbsp;·&nbsp; Esc로 취소</div>
      <input type="file" id="photo-upload-input" accept="image/*" style="display:none">
    </main>
  </div>

  <!-- Export loading overlay -->
  <div id="export-overlay">
    <div class="export-msg">
      <div class="spinner-wrap">⏳</div>
      이미지 생성 중...
    </div>
  </div>

  <!-- Photo picker modal -->
  <div id="photo-picker-overlay">
    <div id="photo-picker-modal">
      <div id="photo-picker-header">
        <span id="photo-picker-title">사진 선택</span>
        <button id="photo-picker-close">✕</button>
      </div>
      <div id="photo-picker-grid"></div>
      <div id="photo-picker-footer">
        <button id="photo-picker-upload">직접 업로드</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="app.js?v=20260330"></script>
</body>
</html>
