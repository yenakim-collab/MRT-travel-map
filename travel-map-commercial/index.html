<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRT 맵 스튜디오</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>MRT 맵 스튜디오</h1>
        <p class="subtitle">나만의 여행 지도를 만들어보세요</p>
      </div>

      <div id="sidebar-tabs">
        <button class="sidebar-tab active" data-panel="course">여행 코스</button>
        <button class="sidebar-tab" data-panel="region">지역 색칠</button>
      </div>

      <div id="course-panel">
      <div id="search-section">
        <div id="search-wrap">
          <input
            type="text"
            id="search-input"
            placeholder="장소명 검색 (예: 도쿄, 파리)"
            autocomplete="off"
          />
          <div id="search-spinner" class="hidden">⏳</div>
        </div>
        <div id="search-results"></div>
      </div>

      <div id="course-section">
        <div id="course-header">
          <h2>코스 목록</h2>
          <button id="edit-toggle" title="여행지명 편집">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
            </svg>
          </button>
        </div>
        <div id="course-list"></div>
      </div>

      </div><!-- /course-panel -->

      <div id="region-panel" style="display:none">
        <div id="region-level-section">
          <div class="region-level-toggle">
            <button class="region-level-btn active" data-level="country">국가별</button>
            <button class="region-level-btn" data-level="admin1">지역별</button>
          </div>
        </div>
        <div id="region-search-section">
          <div id="region-search-wrap">
            <input type="text" id="region-search-input" placeholder="지역명 검색 (예: Ontario, 日本)" autocomplete="off">
          </div>
          <div id="region-search-results"></div>
        </div>
        <div id="region-palette-section">
          <div class="region-section-title">스타일 설정 <button id="map-style-btn" title="지도 스타일 설정"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg></button></div>
          <div id="region-palette"></div>
          <button id="region-custom-btn">+ 커스텀</button>
        </div>
        <div id="region-list-section">
          <div class="region-section-title">선택된 지역 (<span id="region-count">0</span>) <button id="region-clear-all">전체 삭제</button></div>
          <div id="region-list"><div class="region-empty">지도에서 지역을 클릭하세요</div></div>
        </div>
        <div id="region-loading" class="hidden">
          <div class="region-loading-spinner">⏳</div>
          <span>데이터 로딩 중…</span>
        </div>
      </div>

      <div id="actions">
        <button id="export-btn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor">
            <path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/>
          </svg>
          이미지로 저장
        </button>
        <button id="clear-btn">전체 초기화</button>
      </div>
    </aside>

    <main id="map-container">
      <div id="map"></div>
      <!-- 상단 우측: 핀 추가 버튼만 -->
      <div id="map-controls-top">
        <button id="home-btn" title="전체보기">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
          <span>전체보기</span>
        </button>
        <button id="pin-toggle" title="지도에 핀 찍어 장소 추가">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
          <span>핀 추가</span>
        </button>
      </div>
      <!-- 이동수단 필터 팝오버 (JS로 chips 채워짐) -->
      <div id="badge-filter-popover"></div>
      <!-- 하단 중앙: 표시 옵션 + 배율 -->
      <div id="map-controls-bottom">
        <button id="course-toggle" class="active" title="코스(경로선) 표시/숨기기">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 15.18V7c0-2.21-1.79-4-4-4s-4 1.79-4 4v10c0 1.1-.9 2-2 2s-2-.9-2-2V8.82C8.16 8.4 9 7.3 9 6c0-1.66-1.34-3-3-3S3 4.34 3 6c0 1.3.84 2.4 2 2.82V17c0 2.21 1.79 4 4 4s4-1.79 4-4V7c0-1.1.9-2 2-2s2 .9 2 2v8.18c-1.16.41-2 1.51-2 2.82 0 1.66 1.34 3 3 3s3-1.34 3-3c0-1.31-.84-2.41-2-2.82z"/>
          </svg>
          <span>코스</span>
        </button>
        <button id="badge-toggle" class="active" title="이동수단 표시/숨기기">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M6 18V18.5C6 18.9167 5.85417 19.2708 5.5625 19.5625C5.27083 19.8542 4.91667 20 4.5 20C4.08333 20 3.72917 19.8542 3.4375 19.5625C3.14583 19.2708 3 18.9167 3 18.5V16.95C2.7 16.6167 2.45833 16.2458 2.275 15.8375C2.09167 15.4292 2 14.9833 2 14.5V5C2 3.61667 2.64167 2.60417 3.925 1.9625C5.20833 1.32083 7.23333 1 10 1C12.8667 1 14.9167 1.30833 16.15 1.925C17.3833 2.54167 18 3.56667 18 5V14.5C18 14.9833 17.9083 15.4292 17.725 15.8375C17.5417 16.2458 17.3 16.6167 17 16.95V18.5C17 18.9167 16.8542 19.2708 16.5625 19.5625C16.2708 19.8542 15.9167 20 15.5 20C15.0833 20 14.7292 19.8542 14.4375 19.5625C14.1458 19.2708 14 18.9167 14 18.5V18H6ZM4 9H16V6H4V9ZM6.5 15C6.91667 15 7.27083 14.8542 7.5625 14.5625C7.85417 14.2708 8 13.9167 8 13.5C8 13.0833 7.85417 12.7292 7.5625 12.4375C7.27083 12.1458 6.91667 12 6.5 12C6.08333 12 5.72917 12.1458 5.4375 12.4375C5.14583 12.7292 5 13.0833 5 13.5C5 13.9167 5.14583 14.2708 5.4375 14.5625C5.72917 14.8542 6.08333 15 6.5 15ZM13.5 15C13.9167 15 14.2708 14.8542 14.5625 14.5625C14.8542 14.2708 15 13.9167 15 13.5C15 13.0833 14.8542 12.7292 14.5625 12.4375C14.2708 12.1458 13.9167 12 13.5 12C13.0833 12 12.7292 12.1458 12.4375 12.4375C12.1458 12.7292 12 13.0833 12 13.5C12 13.9167 12.1458 14.2708 12.4375 14.5625C12.7292 14.8542 13.0833 15 13.5 15Z"/>
            </svg>
            <span>이동수단</span>
            <span id="badge-filter-dot"></span>
          </button>
        <button id="photo-toggle" title="여행지 이미지 표시/숨기기">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
          </svg>
          <span>이미지</span>
        </button>
        <button id="region-toggle" class="active" title="지역 색칠 표시/숨기기">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
          <span>색칠</span>
        </button>
        <div class="bottom-divider"></div>
        <button id="scale-cycle-btn" title="마커 배율">1×</button>
        <div class="bottom-divider"></div>
        <div id="marker-style-control">
          <button class="marker-style-btn active" data-style="pill" title="기본 스타일">
            <svg width="24" height="14" viewBox="0 0 24 14"><rect x="0.5" y="0.5" width="23" height="13" rx="7" fill="#fff" stroke="#bbb" stroke-width="1"/><text x="12" y="10.5" text-anchor="middle" font-size="8" font-weight="700" fill="#333" font-family="sans-serif">Ab</text></svg>
          </button>
          <button class="marker-style-btn" data-style="bubble" title="말풍선 스타일">
            <svg width="24" height="18" viewBox="0 0 24 18"><rect x="0.5" y="0.5" width="23" height="13" rx="3" fill="#222" stroke="none"/><polygon points="9,13.5 12,17.5 15,13.5" fill="#222"/><text x="12" y="10.5" text-anchor="middle" font-size="8" font-weight="700" fill="#fff" font-family="sans-serif">Ab</text></svg>
          </button>
        </div>
      </div>
      <div id="region-tooltip"></div>
      <div id="pin-mode-hint">📍 지도를 클릭해서 장소를 추가하세요 &nbsp;·&nbsp; Esc로 취소</div>
      <input type="file" id="photo-upload-input" accept="image/*" style="display:none">
    </main>
  </div>

  <!-- Export loading overlay -->
  <div id="export-overlay">
    <div class="export-msg">
      <div class="spinner-wrap">⏳</div>
      이미지 생성 중...
    </div>
  </div>

  <!-- Photo picker modal -->
  <div id="photo-picker-overlay">
    <div id="photo-picker-modal">
      <div id="photo-picker-header">
        <span id="photo-picker-title">사진 선택</span>
        <button id="photo-picker-close">✕</button>
      </div>
      <div id="photo-picker-grid"></div>
      <div id="photo-picker-footer">
        <button id="photo-picker-upload">직접 업로드</button>
      </div>
    </div>
  </div>

  <!-- Custom color picker modal -->
  <div id="color-picker-overlay">
    <div id="color-picker-modal">
      <div id="color-picker-header">
        <span>사용자 지정</span>
        <button id="color-picker-close">✕</button>
      </div>
      <canvas id="color-picker-sv" width="260" height="180"></canvas>
      <canvas id="color-picker-hue" width="260" height="20"></canvas>
      <div id="color-picker-footer">
        <div id="color-picker-preview"></div>
        <button id="color-picker-select">선택</button>
      </div>
    </div>
  </div>

  <!-- Map Style Settings Overlay -->
  <div id="map-style-overlay">
    <div id="map-style-modal">
      <div id="map-style-header">
        <span>지도 스타일 설정</span>
        <button id="map-style-close">✕</button>
      </div>
      <div class="map-style-row">
        <label>마커 스타일</label>
        <div class="map-style-toggle-group">
          <button class="map-style-toggle active" data-marker="pill">기본</button>
          <button class="map-style-toggle" data-marker="bubble">말풍선</button>
        </div>
      </div>
      <div class="map-style-row">
        <label>바다 색상</label>
        <div class="map-style-swatch" id="map-style-sea" data-color="#BEE8FF"></div>
      </div>
      <div class="map-style-row">
        <label>육지 색상</label>
        <div class="map-style-swatch" id="map-style-land" data-color="#E8EAED"></div>
      </div>
      <div class="map-style-row">
        <label for="map-style-border">선 두께</label>
        <div class="map-style-range-wrap">
          <input type="range" id="map-style-border" min="0" max="3" step="0.1" value="0.6">
          <span id="map-style-border-val">0.6</span>
        </div>
      </div>
      <div id="map-style-footer">
        <button id="map-style-reset">기본값</button>
        <button id="map-style-apply">적용</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="app.js?v=20260409c"></script>
</body>
</html>
